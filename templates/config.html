{% extends 'base.html' %}
{% block title %}Configurações{% endblock %}
{% block content %}
<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Configurações</h2>
<div style="max-width:500px">
<form method="post" class="card">
<div class="form-group"><label>Receita mensal (R$)</label><input type="text" name="receita" value="{{user.receita if user else ''}}"></div>
<div class="form-group"><label>Meta de gasto mensal (R$)</label><input type="text" name="meta_gasto" value="{{user.meta_gasto if user else '4500'}}"></div>
<div class="form-group"><label>Patrimônio atual (R$)</label><input type="text" name="patrimonio" value="{{user.patrimonio if user else '0'}}"></div>
<div class="form-group"><label>CDI anual (%)</label><input type="text" name="cdi" value="{{user.cdi if user else '14.5'}}"></div>
<div class="form-group"><label>Tema</label><select name="tema"><option value="dark" {% if user and user.tema=='dark' %}selected{% endif %}>Escuro</option><option value="light" {% if user and user.tema=='light' %}selected{% endif %}>Claro</option></select></div>
<button class="btn btn-accent">Salvar</button>
</form></div>
{% endblock %}
